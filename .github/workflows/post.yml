name: post-trial-reel

on:
  schedule:
    # 5/day only — account is throttled, keeping volume low + fresh-only. UTC=IL-3.
    - cron: "0 23 * * *"
    - cron: "30 0 * * *"
    - cron: "30 1 * * *"
    - cron: "0 3 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (1 = don't post)"
        default: "0"

concurrency:
  group: poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund @aws-sdk/client-s3
      - run: node post-cloud.mjs
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
